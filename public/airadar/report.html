<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Readiness Report — AI Radar</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/shared.css">
  <link rel="stylesheet" href="/airadar/airadar.css">
  <style>
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .subtitle {
      max-width: 520px;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .report-form {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 500px;
    }

    .report-form input {
      flex: 1;
      padding: 0.65rem 0.75rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f0f0f;
      color: #f0f0f0;
      font-size: 0.95rem;
    }

    .report-form button {
      padding: 0.65rem 1.25rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #f0f0f0;
      color: #0f0f0f;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .report-form button:hover { background: #ddd; }
    .report-form button:disabled { opacity: 0.5; cursor: default; }

    .form-msg {
      font-size: 0.85rem;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }

    /* Results */
    #results {
      width: 100%;
      max-width: 640px;
      text-align: left;
      margin-top: 2.5rem;
    }

    .result-summary {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .category {
      margin-bottom: 1.5rem;
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #222;
      margin-bottom: 0.5rem;
    }

    .category-name {
      font-weight: 600;
      color: #ddd;
      font-size: 1rem;
      text-transform: capitalize;
    }

    .category-count {
      color: #666;
      font-size: 0.85rem;
    }

    .category-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .category-list li {
      padding: 0.35rem 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .category-list a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: capitalize;
    }

    .category-list a:hover { color: #f0f0f0; }

    .empty-category { color: #444; font-size: 0.85rem; font-style: italic; }
  </style>
</head>
<body>

  <main>
    <h1>AI Readiness Report</h1>
    <p class="subtitle">Analyze your store's visibility in ChatGPT, Gemini, Claude and more. Get actionable insights to boost discoverability.</p>
    <form id="reportForm" class="report-form" novalidate>
      <input type="url" name="store_url" placeholder="https://your-store.myshopify.com" required>
      <button type="submit">Analyze</button>
    </form>
    <p id="formMsg" class="form-msg"></p>
    <div id="results"></div>
  </main>

  <script src="/nav.js"></script>
  <script>
    const form = document.getElementById('reportForm');
    const msg = document.getElementById('formMsg');
    const results = document.getElementById('results');
    const btn = form.querySelector('button');

    async function analyzeUrl(value) {
      msg.textContent = '';
      results.innerHTML = '';
      form.store_url.value = value;

      try {
        new URL(value);
      } catch {
        msg.textContent = 'Please enter a valid URL (e.g. https://your-store.myshopify.com)';
        msg.style.color = '#a44';
        return;
      }

      btn.textContent = 'Analyzing...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: value })
        });
        const data = await res.json();

        if (!data.ok) {
          msg.textContent = data.error || 'Could not analyze this site';
          msg.style.color = '#a44';
          return;
        }

        results.innerHTML = renderResults(data);
      } catch {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.style.color = '#a44';
      } finally {
        btn.textContent = 'Analyze';
        btn.disabled = false;
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const value = form.store_url.value.trim();
      if (!value) return;
      const params = new URLSearchParams({ url: value });
      history.pushState(null, '', `/airadar/report?${params}`);
      analyzeUrl(value);
    });

    // Auto-analyze if URL param is present
    const urlParam = new URLSearchParams(location.search).get('url');
    if (urlParam) analyzeUrl(urlParam);

    function renderResults(data) {
      const { tree, total, url } = data;
      const categories = ['products', 'collections', 'pages', 'blogs', 'other'];

      let html = `<p class="result-summary">Found <strong style="color:#f0f0f0">${total}</strong> URLs on <strong style="color:#f0f0f0">${url}</strong></p>`;

      for (const cat of categories) {
        const items = tree[cat] || [];
        if (items.length === 0) continue;

        html += `
          <div class="category">
            <div class="category-header">
              <span class="category-name">${cat}</span>
              <span class="category-count">${items.length}</span>
            </div>
            <ul class="category-list">
              ${items.map(i => `<li><a href="${i.url}" target="_blank">${i.name}</a></li>`).join('')}
            </ul>
          </div>`;
      }

      return html;
    }
  </script>

</body>
</html>
