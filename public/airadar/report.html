<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Readiness Report — AI Radar</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/shared.css">
  <link rel="stylesheet" href="/airadar/airadar.css">
  <style>
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .subtitle {
      max-width: 520px;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .report-form {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 500px;
    }

    .report-form input {
      flex: 1;
      padding: 0.65rem 0.75rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f0f0f;
      color: #f0f0f0;
      font-size: 0.95rem;
    }

    .report-form button {
      padding: 0.65rem 1.25rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #f0f0f0;
      color: #0f0f0f;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .report-form button:hover { background: #ddd; }
    .report-form button:disabled { opacity: 0.5; cursor: default; }

    .form-msg {
      font-size: 0.85rem;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }

    /* Email gate */
    #emailGate {
      display: none;
      width: 100%;
      max-width: 440px;
      margin-top: 2rem;
      padding: 2rem;
      border: 1px solid #222;
      border-radius: 8px;
      background: #161616;
    }

    #emailGate h2 {
      color: #ddd;
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .email-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
    }

    .email-form input {
      padding: 0.65rem 0.75rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f0f0f;
      color: #f0f0f0;
      font-size: 0.95rem;
    }

    .email-form button {
      padding: 0.65rem 1.25rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #f0f0f0;
      color: #0f0f0f;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .email-form button:hover { background: #ddd; }
    .email-form button:disabled { opacity: 0.5; cursor: default; }

    #emailGate .gate-subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    #emailGate .disclaimer {
      color: #555;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      line-height: 1.4;
    }

    /* Results */
    #results {
      width: 100%;
      max-width: 640px;
      text-align: left;
      margin-top: 2.5rem;
    }

    .result-summary {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .category {
      margin-bottom: 1.5rem;
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #222;
      margin-bottom: 0.5rem;
    }

    .category-name {
      font-weight: 600;
      color: #ddd;
      font-size: 1rem;
      text-transform: capitalize;
    }

    .category-count {
      color: #666;
      font-size: 0.85rem;
    }

    .category-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .category-list li {
      padding: 0.35rem 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .category-list a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      text-transform: capitalize;
    }

    .category-list a:hover { color: #f0f0f0; }

    /* Report sections */
    .report-section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #ddd;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #222;
      margin-bottom: 0.5rem;
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
    }

    .report-table tr {
      border-bottom: 1px solid #1a1a1a;
    }

    .row-label {
      color: #888;
      font-size: 0.85rem;
      padding: 0.5rem 0.5rem 0.5rem 0;
      white-space: nowrap;
      vertical-align: top;
      width: 40%;
    }

    .row-value {
      color: #ddd;
      font-size: 0.85rem;
      padding: 0.5rem 0;
      word-break: break-word;
    }

    /* Product accordion */
    .product-detail {
      border: 1px solid #222;
      border-radius: 6px;
      margin-bottom: 0.75rem;
      background: #161616;
    }

    .product-detail summary {
      padding: 0.75rem 1rem;
      cursor: pointer;
      color: #ddd;
      font-weight: 600;
      font-size: 0.9rem;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .product-detail summary::-webkit-details-marker { display: none; }

    .product-detail summary::after {
      content: "+";
      font-size: 1.1rem;
      color: #666;
    }

    .product-detail[open] summary::after {
      content: "−";
    }

    .product-inner {
      padding: 0 1rem 1rem;
    }

    .sub-section {
      margin-top: 1rem;
    }

    .sub-section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body>

  <main>
    <!-- Step 1: Store URL form -->
    <div id="step1">
      <h1>AI Readiness Report</h1>
      <p class="subtitle">Analyze your Shopify store's visibility in ChatGPT, Gemini, Claude and more. Get actionable insights to boost discoverability.</p>
      <form id="reportForm" class="report-form" novalidate>
        <input type="url" name="store_url" placeholder="https://www.shopifystore.com/" required>
        <button type="submit">Analyze</button>
      </form>
      <p id="formMsg" class="form-msg"></p>
    </div>

    <!-- Step 2: Email gate -->
    <div id="emailGate">
      <h2>Your free report is ready</h2>
      <p class="gate-subtitle">Enter your email to access detailed insights, scores, and actionable recommendations.</p>
      <form id="emailForm" class="email-form" novalidate>
        <input type="email" name="email" placeholder="you@example.com" required>
        <button type="submit">Send report link</button>
      </form>
      <p id="emailMsg" class="form-msg"></p>
      <p class="disclaimer">No account required. No spam.</p>
    </div>

    <!-- Results (shown when arriving via email link) -->
    <div id="results"></div>
  </main>

  <script src="/nav.js"></script>
  <script>
    const step1 = document.getElementById('step1');
    const reportForm = document.getElementById('reportForm');
    const formMsg = document.getElementById('formMsg');
    const reportBtn = reportForm.querySelector('button');

    const emailGate = document.getElementById('emailGate');
    const emailForm = document.getElementById('emailForm');
    const emailMsg = document.getElementById('emailMsg');
    const emailBtn = emailForm.querySelector('button');

    const results = document.getElementById('results');

    let currentStoreUrl = '';

    function showStep1() {
      step1.style.display = '';
      emailGate.style.display = 'none';
      results.innerHTML = '';
      formMsg.textContent = '';
      emailMsg.textContent = '';
    }

    function showEmailGate() {
      step1.style.display = 'none';
      emailGate.style.display = 'block';
      results.innerHTML = '';
    }

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(location.search);
      const url = params.get('url');
      const store = params.get('store');

      if (url) {
        loadResults(url);
      } else if (store) {
        currentStoreUrl = store;
        showEmailGate();
      } else {
        showStep1();
      }
    });

    // Step 1: Validate store URL
    reportForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const value = reportForm.store_url.value.trim();
      formMsg.textContent = '';

      try {
        new URL(value);
      } catch {
        formMsg.textContent = 'Please enter a valid URL (e.g. https://www.shopifystore.com/)';
        formMsg.style.color = '#a44';
        return;
      }

      reportBtn.textContent = 'Validating...';
      reportBtn.disabled = true;

      try {
        const res = await fetch('/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: value })
        });
        const data = await res.json();

        if (!data.ok) {
          formMsg.textContent = data.error || 'Could not analyze this site';
          formMsg.style.color = '#a44';
          return;
        }

        // Valid Shopify store — show email gate
        currentStoreUrl = value;
        history.pushState({ step: 'email', storeUrl: value }, '', `/airadar/report?store=${encodeURIComponent(value)}`);
        showEmailGate();
      } catch {
        formMsg.textContent = 'Something went wrong. Please try again.';
        formMsg.style.color = '#a44';
      } finally {
        reportBtn.textContent = 'Analyze';
        reportBtn.disabled = false;
      }
    });

    // Step 2: Email submission
    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailForm.email.value.trim();
      emailMsg.textContent = '';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailMsg.textContent = 'Please enter a valid email address';
        emailMsg.style.color = '#a44';
        return;
      }

      emailBtn.textContent = 'Sending...';
      emailBtn.disabled = true;

      try {
        const res = await fetch('/api/report-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, store_url: currentStoreUrl })
        });
        const data = await res.json();

        if (data.ok) {
          emailMsg.textContent = 'Check your email';
          emailMsg.style.color = '#4a4';
          emailForm.reset();
        } else {
          emailMsg.textContent = data.error || 'Something went wrong';
          emailMsg.style.color = '#a44';
        }
      } catch {
        emailMsg.textContent = 'Something went wrong. Please try again.';
        emailMsg.style.color = '#a44';
      } finally {
        emailBtn.textContent = 'Send report link';
        emailBtn.disabled = false;
      }
    });

    // Direct access via URL param (from email link) — show results
    async function loadResults(url) {
      step1.style.display = 'none';
      results.innerHTML = '<p style="color:#888; text-align:center;">Loading report...</p>';

      try {
        const res = await fetch('/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (!data.ok) {
          results.innerHTML = `<p style="color:#a44; text-align:center;">${data.error}</p>`;
          return;
        }

        results.innerHTML = renderResults(data);
      } catch {
        results.innerHTML = '<p style="color:#a44; text-align:center;">Something went wrong.</p>';
      }
    }

    function renderResults(data) {
      const { tree, total, url, siteIdentity, metadata, structuredData, contentAuthority, policies, crawlability, commerce, productSamples } = data;

      let html = `<p style="margin-bottom:1rem;"><a href="/airadar/report" style="color:#888; text-decoration:none; font-size:0.85rem;">← Back to Search</a></p>`;
      html += `<h1 style="font-size:1.5rem; margin-bottom:0.5rem;">AI Readiness Report</h1>`;
      html += `<p class="result-summary"><strong style="color:#f0f0f0">${url}</strong></p>`;

      // Site Identity
      if (siteIdentity) {
        html += section('Site Identity', [
          row('Site Name', siteIdentity.siteName),
          row('Canonical Domain', siteIdentity.canonicalDomain),
          row('Favicon URL', siteIdentity.faviconUrl ? link(siteIdentity.faviconUrl) : missing()),
        ]);
      }

      // Page Metadata & SEO
      if (metadata) {
        html += section('Page Metadata & SEO', [
          row('Title', metadata.title || missing()),
          row('Description', metadata.description || missing()),
          row('OG Type', metadata.ogType || missing()),
          row('Twitter Card', metadata.twitterCard || missing()),
          row('Twitter Title', metadata.twitterTitle || missing()),
          row('Twitter Image', metadata.twitterImage ? link(metadata.twitterImage) : missing()),
        ]);
      }

      // Policy Pages
      if (policies) {
        html += section('Policy Pages', [
          row('About Page', check(policies.aboutPage)),
          row('Contact Page', check(policies.contactPage)),
          row('Privacy Policy', check(policies.privacyPolicy)),
          row('Terms of Service', check(policies.termsOfService)),
          row('Refund Policy', check(policies.refundPolicy)),
        ]);
      }

      // Content Authority
      if (contentAuthority) {
        html += section('Content Authority', [
          row('Top Keywords', contentAuthority.topKeywords?.length ? contentAuthority.topKeywords.join(', ') : missing()),
          row('Brand Positioning', contentAuthority.brandPositioning || missing()),
        ]);
      }

      // Crawlability
      if (crawlability) {
        html += section('Crawlability', [
          row('robots.txt', check(crawlability.robotsTxt)),
          row('sitemap.xml', check(crawlability.sitemapXml)),
          row('llms.txt', check(crawlability.llmsTxt)),
        ]);
      }

      // Structured Data
      if (structuredData) {
        html += section('Structured Data (Schema.org)', [
          row('Organization', check(structuredData.Organization)),
          row('WebSite', check(structuredData.WebSite)),
          row('Product', check(structuredData.Product)),
          row('FAQPage', check(structuredData.FAQPage)),
          row('Article', check(structuredData.Article)),
        ]);
      }

      // Commerce Readiness
      if (commerce) {
        if (commerce.available) {
          html += section('Commerce Readiness', [
            row('Products Endpoint', check(true)),
            row('Total Products', commerce.totalProducts),
            row('Currency', commerce.currency || 'N/A'),
            row('Average Price', commerce.averagePrice ? `$${commerce.averagePrice}` : 'N/A'),
            row('Price Range', commerce.priceRange ? `$${commerce.priceRange.min} — $${commerce.priceRange.max}` : 'N/A'),
          ]);
        } else {
          html += section('Commerce Readiness', [
            row('Products Endpoint', check(false)),
          ]);
        }
      }

      // Product Samples
      if (productSamples?.length) {
        html += `<div class="report-section"><h2 class="section-title">Product Analysis (${productSamples.length} sampled)</h2>`;
        for (const p of productSamples) {
          html += `<details class="product-detail"><summary>${p.basicData.title}</summary><div class="product-inner">`;

          if (p.seo) {
            html += subSection('SEO & Page Optimization', [
              row('Title', p.seo.title || missing()),
              row('Meta Description', p.seo.metaDescription || missing()),
              row('H1 Tag', p.seo.h1 || missing()),
              row('Canonical URL', p.seo.canonicalUrl ? link(p.seo.canonicalUrl) : missing()),
              row('OG Title', p.seo.ogTitle || missing()),
              row('OG Description', p.seo.ogDescription || missing()),
              row('OG Image', p.seo.ogImage ? link(p.seo.ogImage) : missing()),
              row('OG Type', p.seo.ogType || missing()),
              row('Twitter Card', p.seo.twitterCard || missing()),
              row('Twitter Title', p.seo.twitterTitle || missing()),
              row('Twitter Image', p.seo.twitterImage ? link(p.seo.twitterImage) : missing()),
            ]);
          }

          if (p.openai) {
            html += subSection('OpenAI Flags', [
              row('Enable Search', p.openai.enableSearch || missing()),
              row('Enable Checkout', p.openai.enableCheckout || missing()),
            ]);
          }

          html += subSection('Basic Product Data', [
            row('ID', p.basicData.id),
            row('GTIN', p.basicData.gtin || missing()),
            row('MPN', p.basicData.mpn || missing()),
            row('Title', p.basicData.title),
            row('Description', p.basicData.description || missing()),
            row('Link', link(p.basicData.link)),
          ]);

          html += subSection('Item Information', [
            row('Condition', p.itemInfo.condition || missing()),
            row('Product Category', p.itemInfo.productCategory || missing()),
            row('Brand', p.itemInfo.brand || missing()),
            row('Material', p.itemInfo.material || missing()),
            row('Dimensions', p.itemInfo.dimensions || missing()),
            row('Length', p.itemInfo.length || missing()),
            row('Width', p.itemInfo.width || missing()),
            row('Height', p.itemInfo.height || missing()),
            row('Weight', p.itemInfo.weight || missing()),
            row('Age Group', p.itemInfo.ageGroup || missing()),
          ]);

          html += subSection('Media', [
            row('Image Link', p.media.imageLink ? link(p.media.imageLink) : missing()),
            row('Additional Images', p.media.additionalImages || '0'),
            row('Video Link', p.media.videoLink || missing()),
            row('3D Model Link', p.media.model3dLink || missing()),
          ]);

          html += subSection('Price & Promotions', [
            row('Price', p.priceAndPromotions.price || missing()),
            row('Sale Price', p.priceAndPromotions.salePrice || missing()),
            row('Compare At Price', p.priceAndPromotions.compareAtPrice || missing()),
            row('Sale Price Effective Date', p.priceAndPromotions.salePriceEffectiveDate || missing()),
            row('Currency', p.priceAndPromotions.currency || missing()),
            row('Unit Pricing Measure', p.priceAndPromotions.unitPricingMeasure || missing()),
            row('Base Measure', p.priceAndPromotions.unitPricingBaseMeasure || missing()),
          ]);

          html += subSection('Availability & Inventory', [
            row('Available', p.availability.available !== "" ? check(p.availability.available) : missing()),
            row('Availability Date', p.availability.availabilityDate || missing()),
            row('Inventory Quantity', p.availability.inventoryQuantity !== "" ? p.availability.inventoryQuantity : missing()),
          ]);

          html += subSection('Variants', [
            row('Item Group ID', p.variants.itemGroupId),
            row('Item Group Title', p.variants.itemGroupTitle),
            row('Total Variants', p.variants.totalVariants),
            row('Color', p.variants.color || missing()),
            row('Size', p.variants.size || missing()),
            row('Size System', p.variants.sizeSystem || missing()),
            row('Gender', p.variants.gender || missing()),
            row('Offer ID', p.variants.offerId || missing()),
            ...p.variants.options.map((o, i) => row(`Custom Variant ${i+1} (${o.name})`, o.values.join(', '))),
          ]);

          html += subSection('Fulfillment', [
            row('Shipping', p.fulfillment.shipping || missing()),
            row('Delivery Estimate', p.fulfillment.deliveryEstimate || missing()),
          ]);

          html += subSection('Merchant Info', [
            row('Seller Name', p.merchantInfo.sellerName || missing()),
            row('Seller URL', p.merchantInfo.sellerUrl ? link(p.merchantInfo.sellerUrl) : missing()),
          ]);

          html += subSection('Returns', [
            row('Return Policy', p.returns.returnPolicy || missing()),
            row('Return Window', p.returns.returnWindow || missing()),
          ]);

          html += subSection('Reviews', [
            row('Product Review Count', p.reviews.productReviewCount || missing()),
            row('Product Review Rating', p.reviews.productReviewRating || missing()),
          ]);

          html += `</div></details>`;
        }
        html += `</div>`;
      }

      // Site Map Tree
      const categories = ['products', 'collections', 'pages', 'blogs', 'other'];
      let treeHtml = '';
      for (const cat of categories) {
        const items = tree[cat] || [];
        if (items.length === 0) continue;
        treeHtml += `
          <div class="category">
            <div class="category-header">
              <span class="category-name">${cat}</span>
              <span class="category-count">${items.length}</span>
            </div>
            <ul class="category-list">
              ${items.map(i => `<li><a href="${i.url}" target="_blank">${i.name}</a></li>`).join('')}
            </ul>
          </div>`;
      }
      if (treeHtml) {
        html += `<div class="report-section"><h2 class="section-title">Sitemap (${total} URLs)</h2>${treeHtml}</div>`;
      }

      return html;
    }

    // Render helpers
    function section(title, rows) {
      return `<div class="report-section"><h2 class="section-title">${title}</h2><table class="report-table">${rows.join('')}</table></div>`;
    }
    function subSection(title, rows) {
      return `<div class="sub-section"><h3 class="sub-section-title">${title}</h3><table class="report-table">${rows.join('')}</table></div>`;
    }
    function row(label, value) {
      return `<tr><td class="row-label">${label}</td><td class="row-value">${value}</td></tr>`;
    }
    function check(val) {
      return val ? '<span style="color:#4a4;">Found</span>' : '<span style="color:#a44;">Not found</span>';
    }
    function missing() {
      return '<span style="color:#666;">—</span>';
    }
    function link(url) {
      const short = url.length > 50 ? url.slice(0, 50) + '...' : url;
      return `<a href="${url}" target="_blank" style="color:#aaa; word-break:break-all;">${short}</a>`;
    }

    // Handle initial page load
    const params = new URLSearchParams(location.search);
    const urlParam = params.get('url');
    const storeParam = params.get('store');
    if (urlParam) {
      loadResults(urlParam);
    } else if (storeParam) {
      currentStoreUrl = storeParam;
      showEmailGate();
    }
  </script>

</body>
</html>
