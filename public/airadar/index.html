<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Radar — Polymorph Technologies</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/shared.css">
  <style>
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #888;
      max-width: 560px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .sub-nav {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1rem;
    }

    .sub-nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid #333;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s;
    }

    .sub-nav a:hover {
      border-color: #666;
      color: #f0f0f0;
    }
  </style>
</head>
<body>

  <main>
    <h1>AI Radar</h1>
    <p class="tagline">AI SEO, GEO, AEO optimization — show up in ChatGPT, Gemini, Claude &amp; Perplexity</p>
    <div class="sub-nav">
      <a href="/airadar/blog">Blog</a>
      <a href="/airadar/docs">Documentation</a>
      <a href="/airadar/tutorial">Tutorial</a>
      <a href="/airadar/faq">FAQ</a>
      <a href="/airadar/changelog">Changelog</a>
    </div>
  </main>

  <script src="/nav.js"></script>

</body>
</html>
