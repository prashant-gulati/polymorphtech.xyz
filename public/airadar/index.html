<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Radar — Polymorph AI</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/shared.css">
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    main > * {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    main > *:nth-child(1) { animation-delay: 0s; }
    main > *:nth-child(2) { animation-delay: 0.3s; }
    main > *:nth-child(3) { animation-delay: 0.6s; }
    main > *:nth-child(4) { animation-delay: 0.9s; }
    main > *:nth-child(5) { animation-delay: 1.2s; }

    .hero-heading {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .hero-logo {
      width: clamp(48px, 10vw, 72px);
      height: auto;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--color-text-secondary);
      max-width: 560px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .sub-nav {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1rem;
    }

    .sub-nav a {
      color: var(--color-text-body);
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid var(--color-border-strong);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s;
    }

    .sub-nav a:hover {
      border-color: #666;
      color: #f0f0f0;
    }
  </style>
</head>
<body>

  <main>
    <div class="hero-heading">
      <img src="/airadar/images/ai_radar_1.png" alt="AI Radar" class="hero-logo">
      <h1>AI Radar</h1>
    </div>
    <p class="tagline">AI SEO, GEO, AEO optimization — show up in ChatGPT, Gemini, Claude &amp; Perplexity</p>
  </main>

  <script src="/nav.js"></script>

</body>
</html>
