<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymorph AI</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-55HH3WVTTJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-55HH3WVTTJ');
  </script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="shared.css">
  <script>const t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);</script>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    main > * {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    main > *:nth-child(1) { animation-delay: 0s; }
    main > *:nth-child(2) { animation-delay: 0.3s; }
    main > *:nth-child(3) { animation-delay: 0.6s; }
    main > *:nth-child(4) { animation-delay: 0.9s; }
    main > *:nth-child(5) { animation-delay: 1.2s; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: var(--color-heading-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--color-text-secondary);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>

  <main>
    <h1>Polymorph AI</h1>
    <p class="tagline">Tools for AI-native e-commerce merchants</p>

  </main>

  <script src="nav.js"></script>

</body>
</html>
