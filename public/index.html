<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymorph Technologies</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(15, 15, 15, 0.95);
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: 0.05em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #f0f0f0; }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #f0f0f0;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* Mobile menu */
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: #111;
      border-bottom: 1px solid #222;
      padding: 1rem 2rem;
      gap: 1rem;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      color: #aaa;
      text-decoration: none;
      font-size: 1rem;
      padding: 0.25rem 0;
    }

    .mobile-menu a:hover { color: #f0f0f0; }

    /* Hero */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #888;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .contact-link {
      display: inline-block;
      color: #f0f0f0;
      text-decoration: none;
      border: 1px solid #333;
      padding: 0.65rem 1.5rem;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .contact-link:hover {
      border-color: #666;
      background: #1a1a1a;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1.5rem 2rem;
      color: #444;
      font-size: 0.8rem;
      border-top: 1px solid #1a1a1a;
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand">Polymorph Technologies</span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="privacy.html">Privacy Policy</a></li>
      <li><a href="mailto:support@polymorphtech.xyz">Contact</a></li>
    </ul>
    <button class="hamburger" aria-label="Toggle menu" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="mailto:support@polymorphtech.xyz">Contact</a>
  </div>

  <main>
    <h1>Polymorph Technologies</h1>
    <p class="tagline">Building tools that help Shopify merchants run their stores smarter.</p>
    <a class="contact-link" href="mailto:support@polymorphtech.xyz">support@polymorphtech.xyz</a>
  </main>

  <footer>
    &copy; 2026 Polymorph Technologies &mdash; <a href="privacy.html" style="color:#555;text-decoration:none;">Privacy Policy</a>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }
  </script>

</body>
</html>
